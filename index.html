<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #02040a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            display: block;
            filter: drop-shadow(0 0 10px #00f2fe);
        }

        .dna-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00f2fe;
            font-family: 'Fira Code', monospace;
            text-align: right;
            pointer-events: none;
            font-size: 12px;
            border-right: 2px solid #00f2fe;
            padding-right: 15px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="dna-overlay">
        GENETIC_SEQUENCE: ACTIVE<br>
        DATA_ENCRYPTION: 100%<br>
        HELIX_STABILITY: OPTIMAL
    </div>

    <canvas id="dnaCanvas"></canvas>

    <script>
        const canvas = document.getElementById('dnaCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = window.innerHeight;

        let rotation = 0;
        const nodes = 30; // ডিএনএ-র ধাপ সংখ্যা
        const spread = 80; // হেলিক্সের চওড়া

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < nodes; i++) {
                const y = (i * (canvas.height / nodes)) + 20;
                
                // প্রথম স্ট্র্যান্ডের গাণিতিক হিসাব
                const x1 = Math.sin(rotation + i * 0.5) * spread + canvas.width / 2;
                const size1 = Math.cos(rotation + i * 0.5) * 5 + 8; // ৩ডি গভীরতা বোঝাতে সাইজ পরিবর্তন
                const alpha1 = Math.cos(rotation + i * 0.5) * 0.5 + 0.5;

                // দ্বিতীয় স্ট্র্যান্ডের গাণিতিক হিসাব (১৮০ ডিগ্রি বা PI দূরত্বে)
                const x2 = Math.sin(rotation + i * 0.5 + Math.PI) * spread + canvas.width / 2;
                const size2 = Math.cos(rotation + i * 0.5 + Math.PI) * 5 + 8;
                const alpha2 = Math.cos(rotation + i * 0.5 + Math.PI) * 0.5 + 0.5;

                // কানেক্টিং লাইন (Hydrogen Bonds)
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 242, 254, ${Math.min(alpha1, alpha2) * 0.3})`;
                ctx.lineWidth = 2;
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();

                // প্রথম স্ট্র্যান্ডের বিন্দু
                ctx.beginPath();
                ctx.fillStyle = `rgba(0, 242, 254, ${alpha1})`;
                ctx.arc(x1, y, Math.abs(size1/2), 0, Math.PI * 2);
                ctx.fill();

                // দ্বিতীয় স্ট্র্যান্ডের বিন্দু (ভিন্ন কালার অ্যাকসেন্ট)
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha2})`;
                ctx.arc(x2, y, Math.abs(size2/2), 0, Math.PI * 2);
                ctx.fill();
            }

            rotation += 0.03;
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
