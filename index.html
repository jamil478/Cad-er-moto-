<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #05070a 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            cursor: grab;
            filter: drop-shadow(0 0 50px rgba(0, 113, 227, 0.4));
        }

        canvas:active {
            cursor: grabbing;
        }

        .planet-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-left: 2px solid #00f2fe;
            padding-left: 15px;
            animation: fadeIn 2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h2 { font-size: 18px; margin: 0; }
        p { font-size: 10px; opacity: 0.5; margin: 5px 0 0; }
    </style>
</head>
<body>

    <div class="planet-info">
        <h2>Planet X-81</h2>
        <p>Type: Procedural Gas Giant<br>Status: Exploring...</p>
    </div>
    
    <canvas id="planetCanvas"></canvas>

    <script>
        const canvas = document.getElementById('planetCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, planet;
        const radius = 250;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // গ্রহের উপরিভাগ তৈরি (প্রসিডিউরাল ম্যাপ)
            planet = ctx.createRadialGradient(radius, radius, 0, radius, radius, radius);
            planet.addColorStop(0, '#001a33'); // কোর
            planet.addColorStop(0.3, '#004080'); // গভীর মহাসাগর
            planet.addColorStop(0.5, '#0071e3'); // মহাসাগর
            planet.addColorStop(0.6, '#ffd700'); // মহাদেশ (সোনা)
            planet.addColorStop(0.7, '#fff'); // মেঘ
            planet.addColorStop(1, '#000'); // মহাকাশ
        }

        let mouseX = 0, mouseY = 0;
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        let rotationX = 0, rotationY = 0;

        // মাউস দিয়ে ঘোরানো
        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                rotationY += deltaX * 0.01;
                rotationX += deltaY * 0.01;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // গ্রহের ৩ডি রোটেশন ক্যালকুলেশন
            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.rotate(rotationY);
            ctx.scale(1, Math.cos(rotationX));

            // গ্রহের ছায়া এবং আলো (Lighting & Shadows)
            const shadow = ctx.createRadialGradient(-radius/2, -radius/2, 0, 0, 0, radius);
            shadow.addColorStop(0, 'rgba(255, 255, 255, 0.2)'); // আলো
            shadow.addColorStop(1, 'rgba(0, 0, 0, 0.8)'); // ছায়া

            // গ্রহ আঁকা
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fillStyle = planet;
            ctx.fill();

            // আলো-ছায়া লেয়ার
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fillStyle = shadow;
            ctx.fill();

            ctx.restore();

            // অটোমেটিক রোটেশন
            if (!isDragging) {
                rotationY += 0.005;
            }

            requestAnimationFrame(draw);
        }

        init();
        draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
